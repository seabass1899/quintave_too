name: CI

# Runs automatically on every push and pull request to main.
#
# This runs the engine INVARIANT TESTS only — it does NOT install npm packages
# or build. Reasons:
#   • The tests are dependency-free: they import only this repo's own source and
#     run on plain Node, so no `npm install` is needed.
#   • `npm install` on the GitHub runner crashes ("Exit handler never called!")
#     on this dependency tree — an npm-internal bug, unrelated to our code.
#   • Vercel already runs the real build on every deploy and will block a deploy
#     that doesn't compile, so the build-check lives there.
#
# What this guards: the morning-only practice leak, snapshot round-trip, the
# substitution-map invariant, and the coherence math — the regressions that bit
# this project in development. Green check or red X right in the GitHub UI.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  engine-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # No install step — the tests need no packages. Run them directly.
      - name: Run engine invariant tests
        run: node --experimental-loader ./tests/loader.mjs tests/engine.test.mjs
