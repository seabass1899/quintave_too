name: CI

# Runs automatically on every push and pull request to main.
# Catches the two classes of bug that hit this project in development:
#   1. Build/compile errors (the Vite build must succeed)
#   2. Engine logic regressions (the invariant tests must pass)
# You see a green check or red X right in the GitHub UI — no terminal needed.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install deps with `npm install` (not `npm ci`): this repo's lockfile
      # drifts (mixed npm/pnpm history), and npm install tolerates that while
      # ci does not. No npm cache, which can choke on a stale/mixed lockfile.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # 1) Build must succeed — the check that catches compile errors that can't
      #    be verified locally without a network.
      - name: Build (Vite)
        run: npm run build

      # 2) Engine invariant tests — guards the morning-only leak, snapshot
      #    round-trip, and coherence math. Fails the run if any invariant breaks.
      - name: Run engine tests
        run: npm test
